  # ─── Strategy Comparison ──────────────────────────────────────────────────
  # Which strategy should I follow?

  - name: StrategyComparison
    title: Backtest Strategy Comparison
    description: >
      All 48 strategy variants with performance metrics. Use for strategy
      comparison tables, risk/return scatter plots, Sharpe leaderboards.

    cubes:
