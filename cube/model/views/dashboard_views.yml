  # ─── Market Overview ───────────────────────────────────────────────────────
  # What is the market environment right now?

  - name: MarketOverview
    title: Market Overview
    description: >
      Combines macro regime with market breadth.
      Use for: macro dashboard panels, market health scorecard,
      regime-conditional alerts.

    cubes:
      - join_path: MacroRegime
        includes:
          - ts
          - macro_regime
          - market_regime
          - regime_is_positive
          - composite_macro_score
          - composite_macro_score_30d_avg
          - composite_macro_score_trend
          - credit_score
          - growth_score
          - dollar_score
          - sector_score
          - rates_score
          - inflation_score
          - risk_on_entry_threshold
          - risk_on_exit_threshold
          - risk_off_entry_threshold
          - risk_off_exit_threshold
          - benchmark_close
          - benchmark_above_sma_200
          - avg_composite_score
          - avg_credit_score
          - avg_growth_score
          - avg_dollar_score
          - avg_rates_score
          - avg_inflation_score
          - avg_sector_score
          - risk_on_days
          - risk_off_days
          - neutral_days

  # ─── Sector Leaderboard ────────────────────────────────────────────────────
  # Which sectors and industries are leading right now?

  - name: SectorLeaderboard
    title: Sector & Industry Leaderboard
    description: >
      Combined sector and breadth context. Use for sector rotation charts,
      heatmaps, and industry drill-down tables.

