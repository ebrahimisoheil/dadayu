cubes:
  - name: SectorContext
    title: Sector Context (Weekly)
    sql_table: dadayu.mart_sector_ranker_weekly

    dimensions:
      - name: id
        sql: "market || '|' || sector || '|' || week_start::text"
        type: string
        primary_key: true
        public: false

      - name: week_start
        sql: week_start
        type: time
        title: Week Start

      - name: score_date
        sql: score_date
        type: time
        title: Score Date

      - name: market
        sql: market
        type: string
        title: Market

      - name: sector
        sql: sector
        type: string
        title: Sector

      - name: top_ticker
        sql: top_ticker
        type: string
        title: Top Ticker

      - name: top_name
        sql: top_name
        type: string
        title: Top Company

      - name: sector_rank_in_market
        sql: sector_rank_in_market
        type: number
        title: Sector Rank in Market

      - name: sector_rank_overall
        sql: sector_rank_overall
        type: number
        title: Sector Rank Overall

      - name: weekly_sector_rank_in_market
        sql: weekly_sector_rank_in_market
        type: number
        title: Weekly Rank in Market

      - name: avg_total_score
        sql: avg_total_score
        type: number
        title: Avg Score

      - name: breadth_above_sma_200_pct
        sql: breadth_above_sma_200_pct
        type: number
        title: Breadth Above SMA 200 %

      - name: high_risk_pct
        sql: high_risk_pct
        type: number
        title: High Risk %

      - name: rankable_count
        sql: rankable_count
        type: number
        title: Rankable Stocks

      - name: asset_count
        sql: asset_count
        type: number
        title: Total Stocks

      - name: rank_badge
        title: Rank Badge
        type: string
        case:
          when:
            - sql: "{CUBE}.sector_rank_in_market = 1"
              label: "Gold #1"
            - sql: "{CUBE}.sector_rank_in_market = 2"
              label: "Silver #2"
            - sql: "{CUBE}.sector_rank_in_market = 3"
              label: "Bronze #3"
          else:
            label: "Other"

      - name: strength_label
        title: Sector Strength
        type: string
        case:
          when:
            - sql: "{CUBE}.avg_total_score >= 65"
              label: "Strong"
            - sql: "{CUBE}.avg_total_score >= 50"
              label: "Moderate"
            - sql: "{CUBE}.avg_total_score >= 35"
              label: "Weak"
          else:
            label: "Poor"

      - name: breadth_label
        title: Breadth Label
        type: string
        case:
          when:
            - sql: "{CUBE}.breadth_above_sma_200_pct >= 70"
              label: "Broad Uptrend"
            - sql: "{CUBE}.breadth_above_sma_200_pct >= 50"
              label: "Mixed"
            - sql: "{CUBE}.breadth_above_sma_200_pct >= 30"
              label: "Mostly Below"
          else:
            label: "Downtrend"

    measures:
      - name: count
        type: count
        public: false

      - name: avg_sector_score
        sql: avg_total_score
        type: avg
        title: Avg Sector Score

      - name: avg_breadth
        sql: breadth_above_sma_200_pct
        type: avg
        title: Avg Breadth Above SMA 200 %

      - name: avg_high_risk_pct
        sql: high_risk_pct
        type: avg
        title: Avg High Risk %

      - name: total_stocks
        sql: asset_count
        type: sum
        title: Total Stocks

    segments:
      - name: us_market
        sql: "{CUBE}.market = 'us'"
        title: US Market

      - name: germany_market
        sql: "{CUBE}.market = 'germany'"
        title: Germany Market

      - name: top3_sectors
        sql: "{CUBE}.sector_rank_in_market <= 3"
        title: Top 3 Sectors

      - name: strong_breadth
        sql: "{CUBE}.breadth_above_sma_200_pct >= 60"
        title: Strong Breadth

    pre_aggregations:
      - name: sector_ranking_history
        type: rollup
        dimensions:
          - CUBE.market
          - CUBE.sector
          - CUBE.strength_label
        measures:
          - CUBE.avg_sector_score
          - CUBE.avg_breadth
          - CUBE.avg_high_risk_pct
        time_dimension: CUBE.week_start
        granularity: week
        partition_granularity: quarter
        scheduled_refresh: true
        refresh_key:
          every: 1 hour

