        scheduled_refresh: true
        refresh_key:
          every: 1 hour

  - name: UniverseHealth
    title: Universe Health
    sql_table: dadayu.mart_universe_health_current

    dimensions:
      - name: ticker
        sql: ticker
        type: string
        primary_key: true
        title: Ticker

      - name: market
        sql: market
        type: string
        title: Market

      - name: name
        sql: name
        type: string
        title: Company Name

      - name: sector
        sql: sector
        type: string
        title: Sector

      - name: universe_status
        sql: universe_status
        type: string
        title: Universe Status

    measures:
      - name: count
        type: count
        title: Ticker Count
        drill_members: [ticker, name, sector, universe_status]

      - name: ok_count
        sql: "CASE WHEN {CUBE}.universe_status = 'ok' THEN 1 END"
        type: count
        title: Healthy Tickers

      - name: not_rankable_count
        sql: "CASE WHEN {CUBE}.universe_status = 'not_rankable_latest' THEN 1 END"
        type: count
        title: Not Rankable

      - name: missing_metadata_count
        sql: "CASE WHEN {CUBE}.universe_status = 'missing_sector_or_industry' THEN 1 END"
        type: count
        title: Missing Metadata

      - name: no_price_count
        sql: "CASE WHEN {CUBE}.universe_status = 'no_price_history' THEN 1 END"
        type: count
        title: No Price History
