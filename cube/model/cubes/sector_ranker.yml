cubes:
  - name: SectorRanker
    sql_table: dadayu.mart_sector_ranker_weekly
    title: Sector Rankings (Weekly)
    description: Weekly sector-level aggregates and rankings.

    dimensions:
      - name: id
        sql: "market || '|' || sector || '|' || week_start::text"
        type: string
        primary_key: true
        public: false

      - name: week_start
        sql: week_start
        type: time
        title: Week Start

      - name: market
        sql: market
        type: string
        title: Market

      - name: sector
        sql: sector
        type: string
        title: Sector

      - name: top_ticker
        sql: top_ticker
        type: string
        title: Top Ticker

      - name: sector_rank_in_market
        sql: sector_rank_in_market
        type: number
        title: Sector Rank in Market

    measures:
      - name: avg_score
        sql: avg_total_score
        type: avg
        title: Avg Total Score

      - name: breadth_above_sma_200
        sql: breadth_above_sma_200_pct
        type: avg
        title: Breadth Above SMA 200 %

      - name: rankable_count
        sql: rankable_count
        type: avg
        title: Rankable Stocks

      - name: high_risk_pct
        sql: high_risk_pct
        type: avg
        title: High Risk %

      - name: count
        type: count
        public: false

  - name: IndustryRanker
    sql_table: dadayu.mart_industry_ranker_weekly
    title: Industry Rankings (Weekly)
    description: Weekly industry-level aggregates and rankings.

    dimensions:
      - name: id
        sql: "market || '|' || sector || '|' || industry || '|' || week_start::text"
        type: string
        primary_key: true
        public: false

      - name: week_start
        sql: week_start
        type: time
        title: Week Start

      - name: market
        sql: market
        type: string
        title: Market

      - name: sector
        sql: sector
        type: string
        title: Sector

      - name: industry
        sql: industry
        type: string
        title: Industry

      - name: top_ticker
        sql: top_ticker
        type: string
        title: Top Ticker

      - name: industry_rank_in_market
        sql: industry_rank_in_market
        type: number
        title: Industry Rank in Market

    measures:
      - name: avg_score
        sql: avg_total_score
        type: avg
        title: Avg Total Score

      - name: breadth_above_sma_200
        sql: breadth_above_sma_200_pct
        type: avg
        title: Breadth Above SMA 200 %

      - name: rankable_count
        sql: rankable_count
        type: avg
        title: Rankable Stocks

      - name: count
        type: count
        public: false
