version: 2

models:
  - name: dim_equity_symbol
    description: Current-state equity dimension — latest snapshot row per ticker/market, enriched with GICS hierarchy
    columns:
      - name: equity_id
        description: Surrogate key — hash of ticker and market
        data_tests: [not_null, unique]
      - name: ticker
        description: yfinance symbol (e.g. AAPL, SAP.DE, INFY.NS)
        data_tests: [not_null]
      - name: market
        description: Market identifier — germany, us, or india
        data_tests:
          - not_null
          - accepted_values:
              values: ['germany', 'us', 'india']
      - name: name
        description: Full company name
      - name: sector
        description: GICS sector name (e.g. Technology, Financials)
      - name: industry
        description: GICS industry name within the sector
      - name: currency
        description: Primary trading currency code (e.g. USD, EUR, INR)
      - name: country
        description: Country of incorporation
      - name: market_cap
        description: Total market capitalisation in the trading currency (Nullable)
      - name: pe_ratio
        description: Trailing twelve-month price-to-earnings ratio (Nullable)
      - name: fetched_at
        description: Timestamp when this record was last fetched from yfinance
      - name: sector_id
        description: GICS sector numeric ID (joined from gics_hierarchy seed)
      - name: industry_group_id
        description: GICS industry group numeric ID
      - name: industry_group_name
        description: GICS industry group name
