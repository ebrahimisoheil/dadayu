version: 2

models:
  - name: dim_crypto_symbol
    description: Current-state crypto dimension — latest snapshot row per coin, joined with yfinance symbol from seed
    columns:
      - name: coin_id
        description: CoinGecko asset ID (e.g. bitcoin, ethereum)
        data_tests: [not_null, unique]
      - name: symbol
        description: Lowercase exchange symbol (e.g. btc, eth)
        data_tests: [not_null]
      - name: name
        description: Full cryptocurrency name (e.g. Bitcoin, Ethereum)
      - name: market_rank
        description: CoinGecko global market cap rank (1 = largest)
      - name: market_cap
        description: Total market capitalisation in USD (Nullable)
      - name: category
        description: Asset category (e.g. Layer 1, DeFi)
      - name: chain
        description: Primary blockchain (e.g. Ethereum, Solana)
      - name: yf_symbol
        description: Yahoo Finance ticker used for OHLCV data (e.g. BTC-USD)
        data_tests: [not_null]
      - name: fetched_at
        description: Timestamp when this record was last fetched from CoinGecko
