version: 2

models:
  - name: stg_coingecko__crypto_info
    description: CoinGecko market data for top-20 crypto — deduped via FINAL, rank renamed to market_rank
    columns:
      - name: coin_id
        description: CoinGecko asset ID (e.g. bitcoin, ethereum)
        tests: [not_null]
      - name: symbol
        description: Lowercase exchange symbol (e.g. btc, eth)
        tests: [not_null]
      - name: name
        tests: [not_null]
      - name: market_rank
        description: CoinGecko market cap rank
        tests: [not_null]
      - name: market_cap
        description: Market cap in USD (Nullable — may be missing for small assets)
      - name: category
        description: Asset category sourced from crypto_universe seed (e.g. Layer 1, DeFi)
      - name: chain
        description: Primary chain (deferred — empty string until CoinGecko Pro)
      - name: fetched_at
        tests: [not_null]
