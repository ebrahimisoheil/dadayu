version: 2

models:
  - name: stg_coingecko__crypto_info
    description: CoinGecko market data for top-20 crypto — deduped via FINAL, rank renamed to market_rank
    columns:
      - name: coin_id
        description: CoinGecko asset ID (e.g. bitcoin, ethereum)
        tests: [not_null]
      - name: symbol
        description: Lowercase exchange symbol (e.g. btc, eth)
        tests: [not_null]
      - name: name
        description: Full cryptocurrency name (e.g. Bitcoin, Ethereum)
        tests: [not_null]
      - name: market_rank
        description: CoinGecko global market cap rank (1 = largest)
        tests: [not_null]
      - name: market_cap
        description: Total market capitalisation in USD (Nullable — may be missing for small assets)
      - name: category
        description: Asset category from crypto_universe seed (e.g. Layer 1, DeFi)
      - name: chain
        description: Primary blockchain (e.g. Ethereum, Solana) — empty until CoinGecko Pro
      - name: fetched_at
        description: Timestamp when this record was fetched from CoinGecko
        tests: [not_null]
