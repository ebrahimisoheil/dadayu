version: 2

models:
  - name: stg_yahoo__ohlcv_1d
    description: Daily equity OHLCV bars from ClickHouse prices_daily, deduped via FINAL
    columns:
      - name: ticker
        description: yfinance symbol (e.g. AAPL, SAP.DE, INFY.NS)
        tests: [not_null]
      - name: market
        description: Market identifier — germany, us, or india
        tests: [not_null]
      - name: ts
        description: Date cast to DateTime (midnight UTC)
        tests: [not_null]
      - name: open
        description: Opening price for the daily bar
        tests: [not_null]
      - name: high
        description: Highest price during the day
        tests: [not_null]
      - name: low
        description: Lowest price during the day
        tests: [not_null]
      - name: close
        description: Closing price for the day
        tests: [not_null]
      - name: volume
        description: Total shares/units traded during the day
        tests: [not_null]
