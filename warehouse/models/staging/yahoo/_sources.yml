version: 2

sources:
  - name: yahoo
    database: dadayu
    schema: dadayu
    tables:
      - name: prices_hourly
        description: 1h OHLCV bars ingested from yfinance
        freshness:
          warn_after: {count: 3, period: day}
          error_after: {count: 7, period: day}
        loaded_at_field: ingested_at

      - name: prices_4h
        description: 4h OHLCV bars ingested from yfinance
        freshness:
          warn_after: {count: 3, period: day}
          error_after: {count: 7, period: day}
        loaded_at_field: ingested_at

      - name: prices_daily
        description: Daily OHLCV bars ingested from yfinance
        freshness:
          warn_after: {count: 2, period: day}
          error_after: {count: 4, period: day}
        loaded_at_field: ingested_at

      - name: tickers
        description: Equity metadata from yfinance .info — append-only, deduped via FINAL
