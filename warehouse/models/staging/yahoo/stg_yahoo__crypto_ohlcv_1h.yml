version: 2

models:
  - name: stg_yahoo__crypto_ohlcv_1h
    description: 1h crypto OHLCV bars from ClickHouse crypto_prices_hourly, deduped via FINAL
    columns:
      - name: ticker
        description: yfinance crypto symbol (e.g. BTC-USD, ETH-USD)
        tests: [not_null]
      - name: market
        description: Always 'crypto'
        tests: [not_null]
      - name: ts
        description: Bar open timestamp (UTC, tz-naive)
        tests: [not_null]
      - name: open
        description: Opening price for the 1h bar (USD)
        tests: [not_null]
      - name: high
        description: Highest price during the 1h bar (USD)
        tests: [not_null]
      - name: low
        description: Lowest price during the 1h bar (USD)
        tests: [not_null]
      - name: close
        description: Closing price for the 1h bar (USD)
        tests: [not_null]
      - name: volume
        description: Total units traded during the 1h bar
        tests: [not_null]
