version: 2

models:
  - name: stg_yahoo__crypto_ohlcv_1h
    description: 1h crypto OHLCV bars from ClickHouse crypto_prices_hourly, deduped via FINAL
    columns:
      - name: ticker
        description: yfinance crypto symbol (e.g. BTC-USD, ETH-USD)
        tests: [not_null]
      - name: market
        description: Always 'crypto'
        tests: [not_null]
      - name: ts
        tests: [not_null]
      - name: close
        tests: [not_null]
      - name: volume
        tests: [not_null]
