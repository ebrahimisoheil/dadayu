version: 2

models:
  - name: stg_yahoo__ticker_info
    description: Equity metadata from yfinance .info — append-only, deduped via FINAL
    columns:
      - name: ticker
        description: yfinance symbol (e.g. AAPL, SAP.DE, INFY.NS)
        tests: [not_null]
      - name: market
        description: Market identifier — germany, us, or india
        tests:
          - not_null
          - accepted_values:
              values: [germany, us, india]
      - name: name
        description: Full company name
      - name: sector
        description: GICS sector name (e.g. Technology, Financials)
      - name: industry
        description: GICS industry name within the sector
      - name: currency
        description: Primary trading currency code (e.g. USD, EUR, INR)
      - name: country
        description: Country of incorporation
      - name: market_cap
        description: Total market capitalisation in the trading currency (Nullable)
      - name: pe_ratio
        description: Trailing twelve-month price-to-earnings ratio (Nullable)
      - name: fetched_at
        description: Timestamp when this record was fetched from yfinance
        tests: [not_null]
