version: 2

models:
  - name: stg_polymarket__markets
    description: >
      Cleaned Polymarket market metadata. One row per condition_id (latest version via ReplacingMergeTree FINAL).
      Full refresh on every run — source is ~100-500 rows.
    config:
      tags: [polymarket, staging, markets]
    meta:
      owner: data-engineering
      sla: daily
      source_api: Gamma API (https://gamma-api.polymarket.com)
    columns:
      - name: condition_id
        description: Unique market identifier from Polymarket (hex string)
        tests:
          - not_null
          - unique
      - name: question
        description: Full market question text
        tests:
          - not_null
      - name: category
        description: Market category as returned by Gamma API (e.g. "Crypto", "Politics")
      - name: volume_usd
        description: Total USD volume traded on this market since inception
        tests:
          - not_null
      - name: liquidity_usd
        description: Current USD liquidity in the order book
        tests:
          - not_null
      - name: active
        description: True when market is accepting orders
        tests:
          - not_null
      - name: closed
        description: True when market has resolved or been tombstoned. Closed markets exit the price fetch loop permanently.
        tests:
          - not_null
      - name: resolution_date
        description: Expected resolution date (nullable — some markets have no fixed end date)
      - name: outcome
        description: "'YES' | 'NO' | null. Populated only after resolution."
        tests:
          - accepted_values:
              values: ['YES', 'NO']
              quote: true
              config:
                where: "outcome IS NOT NULL"
      - name: yes_token_id
        description: CLOB token ID for the YES outcome — required by the CLOB prices-history API. NOT the same as condition_id.
      - name: linked_asset
        description: "Ticker this market correlates to (e.g. BTC-USD). Null when no clear asset link."
      - name: asset_type
        description: "'crypto' | 'equity' | 'macro' | null"
        tests:
          - accepted_values:
              values: ['crypto', 'equity', 'macro']
              quote: true
              config:
                where: "asset_type IS NOT NULL"
      - name: fetched_at
        description: Timestamp of the latest Gamma API fetch for this market
        tests:
          - not_null
