version: 2

models:
  - name: int_calendar_sessions
    description: Trading calendar with session metadata — one row per market-date
    columns:
      - name: date
        description: Calendar date
        tests: [not_null]
      - name: market
        description: Market identifier — germany, us, or india
        tests: [not_null]
      - name: is_trading_day
        description: True if a regular trading session occurs on this date
        tests: [not_null]
      - name: session_open_utc
        description: Market open time in UTC for this date
      - name: session_close_utc
        description: Market close time in UTC for this date
      - name: session_id
        description: Unique session key — format MARKET_YYYYMMDD (e.g. US_20260519)
        tests: [not_null, unique]
