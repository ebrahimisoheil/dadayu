version: 2

models:
  - name: int_calendar_sessions
    description: Trading calendar with session metadata — one row per market-date
    columns:
      - name: date
        tests: [not_null]
      - name: market
        tests: [not_null]
      - name: session_id
        description: Unique key — e.g. US_20260301
        tests: [not_null, unique]
      - name: is_trading_day
        tests: [not_null]
