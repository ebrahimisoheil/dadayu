version: 2

models:
  - name: int_polymarket_prices_1d
    description: Polymarket probabilities resampled to 1-day buckets. One row per (condition_id, ts).
    columns:
      - name: condition_id
        tests:
          - not_null
      - name: ts
        description: Day bucket start (toStartOfDay)
        tests:
          - not_null
      - name: probability
        description: Close-of-day probability (argMax)
      - name: volume_usd
        description: Total volume traded in this day
      - name: is_interpolated
        description: Always false. Reserved for forward-fill flag.
