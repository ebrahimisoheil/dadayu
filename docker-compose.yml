services:
  dadayu_postgres:
    image: postgres:16-alpine
    container_name: dadayu_postgres
    environment:
      POSTGRES_USER: ${DAGSTER_PG_USER:-dagster}
      POSTGRES_PASSWORD: ${DAGSTER_PG_PASSWORD:-dagster}
      POSTGRES_DB: ${DAGSTER_PG_DB:-dagster}
    ports:
      - "${DADAYU_PG_PORT:-5432}:5432"
    volumes:
      - dadayu_pg_data:/var/lib/postgresql/data
      - ./db/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 10s
      timeout: 5s
      retries: 5

  dadayu_dagster_code:
    build: .
    image: dadayu:latest
    container_name: dadayu_dagster_code
    command: dagster code-server start -h 0.0.0.0 -p 4000 -m dagster_pipeline.definitions
    env_file: .env
    environment:
      DAGSTER_HOME: /opt/dagster/home
      DADAYU_PG_HOST: dadayu_postgres
      DADAYU_PG_PORT: 5432
      DADAYU_PG_DB: ${DADAYU_PG_DB:-dadayu}
      DADAYU_PG_USER: ${DADAYU_PG_USER:-dadayu}
      DADAYU_PG_PASSWORD: ${DADAYU_PG_PASSWORD:-dadayu}
      DAGSTER_PG_USER: ${DAGSTER_PG_USER:-dagster}
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD:-dagster}
      DAGSTER_PG_HOST: dadayu_postgres
      DAGSTER_PG_DB: ${DAGSTER_PG_DB:-dagster}
    volumes:
      - dadayu_dagster_home:/opt/dagster/home
      - ./dagster_config/dagster.yaml:/opt/dagster/home/dagster.yaml:ro
      - ./dagster_config/workspace.yaml:/opt/dagster/home/workspace.yaml:ro
      - ~/.dbt:/root/.dbt:ro
    healthcheck:
      test: ["CMD-SHELL", "dagster api grpc-health-check -p 4000"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      dadayu_postgres:
        condition: service_healthy

  dadayu_dagster_webserver:
    build: .
    image: dadayu:latest
    container_name: dadayu_dagster_webserver
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w /opt/dagster/home/workspace.yaml
    ports:
      - "127.0.0.1:13000:3000"
    env_file: .env
    environment:
      DAGSTER_HOME: /opt/dagster/home
      DADAYU_PG_HOST: dadayu_postgres
      DADAYU_PG_PORT: 5432
      DADAYU_PG_DB: ${DADAYU_PG_DB:-dadayu}
      DADAYU_PG_USER: ${DADAYU_PG_USER:-dadayu}
      DADAYU_PG_PASSWORD: ${DADAYU_PG_PASSWORD:-dadayu}
      DAGSTER_PG_USER: ${DAGSTER_PG_USER:-dagster}
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD:-dagster}
      DAGSTER_PG_HOST: dadayu_postgres
      DAGSTER_PG_DB: ${DAGSTER_PG_DB:-dagster}
    volumes:
      - dadayu_dagster_home:/opt/dagster/home
      - ./dagster_config/dagster.yaml:/opt/dagster/home/dagster.yaml:ro
      - ./dagster_config/workspace.yaml:/opt/dagster/home/workspace.yaml:ro
    depends_on:
      dadayu_dagster_code:
        condition: service_healthy

  dadayu_dagster_daemon:
    build: .
    image: dadayu:latest
    container_name: dadayu_dagster_daemon
    command: dagster-daemon run -w /opt/dagster/home/workspace.yaml
    env_file: .env
    environment:
      DAGSTER_HOME: /opt/dagster/home
      DADAYU_PG_HOST: dadayu_postgres
      DADAYU_PG_PORT: 5432
      DADAYU_PG_DB: ${DADAYU_PG_DB:-dadayu}
      DADAYU_PG_USER: ${DADAYU_PG_USER:-dadayu}
      DADAYU_PG_PASSWORD: ${DADAYU_PG_PASSWORD:-dadayu}
      DAGSTER_PG_USER: ${DAGSTER_PG_USER:-dagster}
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD:-dagster}
      DAGSTER_PG_HOST: dadayu_postgres
      DAGSTER_PG_DB: ${DAGSTER_PG_DB:-dagster}
    volumes:
      - dadayu_dagster_home:/opt/dagster/home
      - ./dagster_config/dagster.yaml:/opt/dagster/home/dagster.yaml:ro
      - ./dagster_config/workspace.yaml:/opt/dagster/home/workspace.yaml:ro
    depends_on:
      dadayu_dagster_code:
        condition: service_healthy

  dadayu_dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    container_name: dadayu_dbt
    volumes:
      - ./warehouse:/usr/app/dbt
      - ~/.dbt:/root/.dbt:ro
    environment:
      DADAYU_PG_HOST: dadayu_postgres
      DADAYU_PG_PORT: 5432
      DADAYU_PG_DB: ${DADAYU_PG_DB:-dadayu}
      DADAYU_PG_USER: ${DADAYU_PG_USER:-dadayu}
      DADAYU_PG_PASSWORD: ${DADAYU_PG_PASSWORD:-dadayu}
    working_dir: /usr/app/dbt
    depends_on:
      dadayu_postgres:
        condition: service_healthy
    profiles:
      - tools

  dadayu_cube:
    image: cubejs/cube:latest
    container_name: dadayu_cube
    ports:
      - "127.0.0.1:14000:4000"
    environment:
      CUBEJS_DB_TYPE: postgres
      CUBEJS_DB_HOST: dadayu_postgres
      CUBEJS_DB_PORT: 5432
      CUBEJS_DB_NAME: ${DADAYU_PG_DB:-dadayu}
      CUBEJS_DB_USER: ${DADAYU_PG_USER:-dadayu}
      CUBEJS_DB_PASS: ${DADAYU_PG_PASSWORD:-dadayu}
      CUBEJS_DB_SCHEMA: dadayu
      CUBEJS_API_SECRET: ${CUBE_API_SECRET:-dadayu_cube_secret_change_in_prod}
      CUBEJS_DEV_MODE: ${CUBEJS_DEV_MODE:-true}
    volumes:
      - ./cube:/cube/conf
    depends_on:
      dadayu_postgres:
        condition: service_healthy

  dadayu_metabase:
    image: metabase/metabase:v0.61.2
    container_name: dadayu_metabase
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: dadayu_postgres
      MB_DB_PORT: 5432
      MB_DB_USER: ${DAGSTER_PG_USER:-dagster}
      MB_DB_PASS: ${DAGSTER_PG_PASSWORD:-dagster}
      MB_DB_DBNAME: metabase
      JAVA_TIMEZONE: UTC
    volumes:
      - dadayu_metabase_data:/metabase-data
    depends_on:
      dadayu_postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  dadayu_pg_data:
  dadayu_dagster_home:
  dadayu_metabase_data:
