services:
  dadayu_clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: dadayu_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-dadayu}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-dadayu}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-changeme}
    volumes:
      - dadayu_ch_data:/var/lib/clickhouse
      - ./db/clickhouse_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  dadayu_postgres:
    image: postgres:16-alpine
    container_name: dadayu_postgres
    environment:
      POSTGRES_USER: ${DAGSTER_PG_USER:-dagster}
      POSTGRES_PASSWORD: ${DAGSTER_PG_PASSWORD:-dagster}
      POSTGRES_DB: ${DAGSTER_PG_DB:-dagster}
    volumes:
      - dadayu_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 10s
      timeout: 5s
      retries: 5

  dadayu_postgres_setup:
    image: postgres:16-alpine
    container_name: dadayu_postgres_setup
    restart: "no"
    depends_on:
      dadayu_postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DAGSTER_PG_PASSWORD:-dagster}
    command: >
      psql -h dadayu_postgres -U ${DAGSTER_PG_USER:-dagster} -d ${DAGSTER_PG_DB:-dagster}
      -c "SELECT 'CREATE DATABASE metabase' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'metabase')\gexec"

  dadayu_dagster_code:
    build: .
    image: dadayu:latest
    container_name: dadayu_dagster_code
    command: dagster code-server start -h 0.0.0.0 -p 4000 -m dagster_pipeline.definitions
    env_file: .env
    environment:
      DAGSTER_HOME: /opt/dagster/home
      CLICKHOUSE_HOST: dadayu_clickhouse
      DAGSTER_PG_USER: ${DAGSTER_PG_USER:-dagster}
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD:-dagster}
      DAGSTER_PG_HOST: dadayu_postgres
      DAGSTER_PG_DB: ${DAGSTER_PG_DB:-dagster}
    volumes:
      - dadayu_dagster_home:/opt/dagster/home
      - ./dagster_config/dagster.yaml:/opt/dagster/home/dagster.yaml:ro
      - ./dagster_config/workspace.yaml:/opt/dagster/home/workspace.yaml:ro
      - ~/.dbt:/root/.dbt:ro
    healthcheck:
      test: ["CMD-SHELL", "dagster api grpc-health-check -p 4000"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      dadayu_clickhouse:
        condition: service_healthy
      dadayu_postgres:
        condition: service_healthy

  dadayu_dagster_webserver:
    build: .
    image: dadayu:latest
    container_name: dadayu_dagster_webserver
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w /opt/dagster/home/workspace.yaml
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DAGSTER_HOME: /opt/dagster/home
      CLICKHOUSE_HOST: dadayu_clickhouse
      DAGSTER_PG_USER: ${DAGSTER_PG_USER:-dagster}
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD:-dagster}
      DAGSTER_PG_HOST: dadayu_postgres
      DAGSTER_PG_DB: ${DAGSTER_PG_DB:-dagster}
    volumes:
      - dadayu_dagster_home:/opt/dagster/home
      - ./dagster_config/dagster.yaml:/opt/dagster/home/dagster.yaml:ro
      - ./dagster_config/workspace.yaml:/opt/dagster/home/workspace.yaml:ro
    depends_on:
      dadayu_dagster_code:
        condition: service_healthy

  dadayu_dagster_daemon:
    build: .
    image: dadayu:latest
    container_name: dadayu_dagster_daemon
    command: dagster-daemon run -w /opt/dagster/home/workspace.yaml
    env_file: .env
    environment:
      DAGSTER_HOME: /opt/dagster/home
      CLICKHOUSE_HOST: dadayu_clickhouse
      DAGSTER_PG_USER: ${DAGSTER_PG_USER:-dagster}
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD:-dagster}
      DAGSTER_PG_HOST: dadayu_postgres
      DAGSTER_PG_DB: ${DAGSTER_PG_DB:-dagster}
    volumes:
      - dadayu_dagster_home:/opt/dagster/home
      - ./dagster_config/dagster.yaml:/opt/dagster/home/dagster.yaml:ro
      - ./dagster_config/workspace.yaml:/opt/dagster/home/workspace.yaml:ro
    depends_on:
      dadayu_dagster_code:
        condition: service_healthy

  dadayu_api:
    build: .
    image: dadayu:latest
    container_name: dadayu_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      CLICKHOUSE_HOST: dadayu_clickhouse
    depends_on:
      dadayu_clickhouse:
        condition: service_healthy

  dadayu_dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    container_name: dadayu_dbt
    volumes:
      - ./warehouse:/usr/app/dbt
      - ~/.dbt:/root/.dbt:ro
    working_dir: /usr/app/dbt
    depends_on:
      dadayu_clickhouse:
        condition: service_healthy
    profiles:
      - tools

  dadayu_metabase:
    image: metabase/metabase:v0.61.2
    container_name: dadayu_metabase
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: dadayu_postgres
      MB_DB_PORT: 5432
      MB_DB_USER: ${DAGSTER_PG_USER:-dagster}
      MB_DB_PASS: ${DAGSTER_PG_PASSWORD:-dagster}
      MB_DB_DBNAME: metabase
      JAVA_TIMEZONE: UTC
    volumes:
      - dadayu_metabase_data:/metabase-data
    depends_on:
      dadayu_clickhouse:
        condition: service_healthy
      dadayu_postgres_setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  dadayu_ch_data:
  dadayu_pg_data:
  dadayu_dagster_home:
  dadayu_metabase_data:
